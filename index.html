<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScamShield NG</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      margin: 0;
      padding: 30px 15px;
      color: #222;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
      color: #0b7a3b;
    }

    p {
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 12px 22px;
      font-size: 16px;
      background: #0b7a3b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #095f2e;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    #details {
      margin-top: 10px;
      font-size: 16px;
      color: #444;
    }

    .tip {
      margin-top: 20px;
      padding: 12px;
      background: #f1fff5;
      border-left: 4px solid #0b7a3b;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>ScamShield NG 🇳🇬</h2>
    <p>Paste an SMS below to analyze whether it looks safe, suspicious, or likely to be a scam.</p>

    <textarea id="sms" placeholder="Paste SMS here..."></textarea>
    <button onclick="checkSMS()">Analyze</button>

    <h3 id="result"></h3>
    <p id="details"></p>

    <div class="tip">
      <b>Tip:</b> Never click unknown links or share OTP with anyone.
    </div>
  </div>

  <script>
  function speak(text) {
    window.speechSynthesis.cancel();
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 1;
    window.speechSynthesis.speak(speech);
  }

  function checkSMS() {
    let text = document.getElementById("sms").value.toLowerCase();
    let scamWords = ["urgent","click","win","free","otp","verify","account blocked"];
    let score = 0;

    scamWords.forEach(word => {
      if (text.includes(word)) score += 20;
    });

    if (text.includes("http") || text.includes("www")) score += 30;

    let result = "";

    if (score >= 60) {
      result = "❌ Scam Message";
      speak("Warning. This is a scam message.");
    } else if (score >= 30) {
      result = "⚠️ Suspicious Message";
      speak("This message looks suspicious.");
    } else {
      result = "✅ Safe Message";
      speak("This message is safe.");
    }

    document.getElementById("result").innerText = result;
  }
</script>
</body>
</html>
