<!DOCTYPE html>
<html>
<head>
  <title>ScamShield NG</title>
</head>
<body>
  <h2>ScamShield NG 🇳🇬</h2>
  <textarea id="sms" placeholder="Paste SMS here..." rows="5" cols="40"></textarea><br><br>
  <button onclick="checkSMS()">Analyze</button>

  <h3 id="result"></h3>

  <script>
    function checkSMS() {
      let text = document.getElementById("sms").value.toLowerCase();

      let scamWords = ["urgent","click","win","free","otp","verify","account blocked"];
      let score = 0;

      scamWords.forEach(word => {
        if(text.includes(word)) score += 20;
      });

      if(text.includes("http")) score += 30;

      let result = "";

      if(score >= 60){
        result = "❌ Scam Message (" + score + "% risk)";
      } else if(score >= 30){
        result = "⚠️ Suspicious (" + score + "% risk)";
      } else {
        result = "✅ Safe Message";
      }

      document.getElementById("result").innerText = result;
    }
  </script>
</body>
</html>
